<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון אופטיקה גאומטרית</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #abbad6, #a9b8d3);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background: rgba(0, 0, 0, 0.85);
            padding: 25px;
            border-radius: 12px;
            width: 600px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .question {
            margin-bottom: 15px;
            font-size: 18px;
        }
        .answers button {
            display: block;
            width: 100%;
            margin: 6px 0;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .answers button:hover {
            background-color: #3b82f6;
            color: white;
        }
        #next-btn, #restart-btn {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background-color: #22c55e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        #restart-btn {
            background-color: #f59e0b;
            display: none;
        }
        #result {
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>חידון אופטיקה גאומטרית</h1>
    <div id="quiz">
        <div class="question" id="question"></div>
        <div class="answers" id="answers"></div>
        <button id="next-btn">השאלה הבאה</button>
        <button id="restart-btn">התחל מחדש</button>
        <div id="result"></div>
    </div>
</div>

<script>
    const allQuestions = [
{
    question: "מה קובע חוק ההחזרה של אור?",
    answers: [
        "∮C f(z) dz = 2πi ∑ Res(f, ak)",
        "זווית הפגיעה שווה לזווית ההחזרה",
        "iħ ∂Ψ/∂t = ĤΨ",
        "∇·E = ρ/ε₀"
    ],
    correct: 1
},
{
    question: "עדשה קמורה נקראת גם בשם:",
    answers: ["עדשה מפזרת", "מראה מישורית", "עדשה מרכזת", "עדשה קעורה"],
    correct: 2
},
{
    question: "מה קורה למהירות האור כאשר הוא עובר מאוויר למים?",
    answers: ["המהירות גדלה", "המהירות אינה משתנה", "האור נעלם", "המהירות קטנה"],
    correct: 3
},
{
    question: "מקדם השבירה של אוויר (בקירוב) הוא:",
    answers: ["0", "2", "1", "תלוי בחומר"],
    correct: 2
},
{
    question: "כאשר קרן אור פוגעת בניצב למשטח, מהי זווית השבירה?",
    answers: ["90°", "45°", "0°", "תלויה במקדם השבירה"],
    correct: 2
},
{
    question: "עדשה קעורה היא עדשה:",
    answers: ["מפזרת", "מרכזת", "מחזירה אור", "אופטית בלבד"],
    correct: 0
},
{
    question: "באיזה סימון מקובל להשתמש עבור מרחק מוקד?",
    answers: ["d", "n", "f", "v"],
    correct: 2
},
{
    question: "מהי נוסחת העדשה הדקה?",
    answers: [
        "ζ(s) = ∑_{n=1}^{∞} 1/n^s",
        "1/f = 1/do + 1/di",
        "e^{ix} = cos(x) + i sin(x)",
        "ℒ{f(t)} = ∫_0^{∞} e^{-st} f(t) dt"
    ],
    correct: 1
},
{
    question: "קרן אור פוגעת במראה בזווית של 30°. מהי זווית ההחזרה?",
    answers: ["60°", "30°", "0°", "15°"],
    correct: 1
},
{
    question: "קרן אור פוגעת במראה בזווית של 45°. מהי זווית ההחזרה?",
    answers: ["90°", "0°", "45°", "22.5°"],
    correct: 2
},
{
    question: "קרן אור פוגעת במראה בזווית של 70°. מהי זווית ההחזרה?",
    answers: ["20°", "140°", "35°", "70°"],
    correct: 3
},
{
    question: "על פי חוק ההחזרה, זווית ההחזרה תמיד שווה ל:",
    answers: ["חצי מזווית הפגיעה", "זווית הפגיעה", "כפול מזווית הפגיעה", "0"],
    correct: 1
},
{
    question: "אם זווית ההחזרה היא 25°, מהי זווית הפגיעה?",
    answers: ["50°", "25°", "75°", "12.5°"],
    correct: 1
},
{
    question: "קרן אור עוברת מאוויר (n=1) למים (n=1.33) בזווית פגיעה של 30°. מה יקרה לכיוון הקרן?",
    answers: ["תישבר הרחק מהנורמל", "לא תשתנה", "תישבר לכיוון הנורמל", "תלוי בעוצמת האור"],
    correct: 2
},
{
    question: "אם n1=1 , n2=2 וזווית הפגיעה היא 30°, זווית השבירה תהיה:",
    answers: ["גדולה מ-30°", "שווה ל-30°", "קטנה מ-30°", "90°"],
    correct: 2
},
{
    question: "כאשר אור עובר מזכוכית לאוויר, זווית השבירה תהיה:",
    answers: ["קטנה יותר מזווית הפגיעה", "0", "גדולה יותר מזווית הפגיעה", "שווה לזווית הפגיעה"],
    correct: 2
},
{
    question: "אם זווית הפגיעה היא 0°, מה תהיה זווית השבירה?",
    answers: ["90°", "0°", "45°", "תלויה במקדם השבירה"],
    correct: 1
},
{
    question: "חוק סנל מתואר על ידי המשוואה:",
    answers: [
        "∮C f(z) dz = 2πi ∑ Res(f, ak)",
        "iħ ∂Ψ/∂t = -(ħ²/2m)∇²Ψ + VΨ",
        "n1*sinθ1 = n2*sinθ2",
        "∫_{-∞}^{∞} e^(-x²) dx = √π"
    ],
    correct: 2
},
{
    question: "מוקד של מראה קעורה נמצא:",
    answers: ["מאחורי המראה", "במרכז המראה", "לפני המראה", "באינסוף"],
    correct: 2
},
{
    question: "הדמות הנוצרת במראה מישורית היא:",
    answers: ["אמיתית", "הפוכה", "מדומה", "מוקטנת"],
    correct: 2
},
{
    question: "מקדם שבירה גדול יותר פירושו:",
    answers: ["מהירות אור גדולה יותר", "אין קשר למהירות", "האור חזק יותר", "מהירות אור קטנה יותר"],
    correct: 3
},
{
    question: "מהן יחידות המדידה של מרחק מוקד?",
    answers: ["שנייה", "ניוטון", "מטר", "וולט"],
    correct: 2
},
{
    question: "זווית קריטית מתרחשת כאשר:",
    answers: ["אין שבירה כלל", "מתרחשת החזרה פנימית מלאה", "האור נעצר", "האור מתפזר"],
    correct: 1
},
{
    question: "אם n1 > n2 הקרן לאחר השבירה תנוע:",
    answers: ["אל הנורמל", "לא תישבר", "תיעלם", "הרחק מהנורמל"],
    correct: 3
},
{
    question: "דמות אמיתית ניתן להקרין על:",
    answers: ["מראה", "אוויר", "מסך", "עדשה"],
    correct: 2
},
{
    question: "במראה מישורית גודל הדמות הוא:",
    answers: ["קטן יותר מהעצם", "שווה לגודל העצם", "גדול יותר מהעצם", "אפס"],
    correct: 1
},
{
    question: "הנורמל למשטח הוא קו:",
    answers: ["מקביל למשטח", "אלכסוני", "מאונך למשטח", "עקום"],
    correct: 2
},
{
    question: "קרן אור עוברת מאוויר (n1=1) לזכוכית (n2=1.5) בזווית פגיעה של 30°. מהי בקירוב זווית השבירה?",
    answers: ["30°", "19°", "45°", "60°"],
    correct: 1
},
{
    question: "קרן אור פוגעת במראה בזווית של 40°. מהי זווית ההחזרה?",
    answers: ["20°", "80°", "50°", "40°"],
    correct: 3
},
{
    question: "קרן אור עוברת מאוויר (n1=1) לזכוכית (n2=1.5). אם זווית השבירה היא 19°, מהי בקירוב זווית הפגיעה?",
    answers: ["19°", "45°", "30°", "60°"],
    correct: 2
},
{
    question: "מקדם השבירה של חומר הוא n=1.5. מהי מהירות האור בחומר?",
    answers: ["2×10^8 m/s", "4.5×10^8 m/s", "3×10^8 m/s", "1×10^8 m/s"],
    correct: 0
},
{
    question: "מהירות האור בחומר היא 2×10^8 m/s. מהו מקדם השבירה של החומר?",
    answers: ["1", "1.5", "1.33", "2"],
    correct: 1
}

    ];

    let questions = [];
    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById('question');
    const answersEl = document.getElementById('answers');
    const nextBtn = document.getElementById('next-btn');
    const restartBtn = document.getElementById('restart-btn');
    const resultEl = document.getElementById('result');

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        questions = shuffle([...allQuestions]).slice(0, 32);
        currentQuestion = 0;
        score = 0;
        resultEl.textContent = '';
        restartBtn.style.display = 'none';
        questionEl.style.display = 'block';
        nextBtn.style.display = 'block';
        loadQuestion();
    }
    function loadQuestion() {
    resetState();
    let q = questions[currentQuestion];
    questionEl.textContent = q.question;
    q.answers.forEach((answer, index) => {
        const button = document.createElement('button');
        button.innerHTML = answer;
        button.addEventListener('click', () => selectAnswer(index));
        answersEl.appendChild(button);
    });
}
function loadQuestion() {
    resetState();
    let q = questions[currentQuestion];
    questionEl.textContent = q.question;
    q.answers.forEach((answer, index) => {
        const button = document.createElement('button');
        button.innerHTML = `<span style="direction:ltr; display:inline-block;">${answer}</span>`;
        button.addEventListener('click', () => selectAnswer(index));
        answersEl.appendChild(button);
    });
}
    function resetState() {
        answersEl.innerHTML = '';
    }

    function selectAnswer(index) {
        const correct = questions[currentQuestion].correct;
        if (index == correct) score++;

        Array.from(answersEl.children).forEach((button, i) => {
            button.disabled = true;
            if (i == correct) button.style.backgroundColor = 'green';
            else if (i == index) button.style.backgroundColor = 'red';
        });
    }

    nextBtn.addEventListener('click', () => {
        currentQuestion++;
        if (currentQuestion < questions.length) loadQuestion();
        else showResult();
    });

    function showResult() {
        questionEl.style.display = 'none';
        nextBtn.style.display = 'none';
        resultEl.textContent = `ציון: ${score} / 32`;
        restartBtn.style.display = 'block';
    }

    restartBtn.addEventListener('click', startQuiz);

    startQuiz();
</script>

</body>
</html>
